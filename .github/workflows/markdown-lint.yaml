---
name: markdown-lint

"on":
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '.markdownlint-cli2.yaml'
      - '.github/workflows/markdown-lint.yaml'
  pull_request:
    paths:
      - '**.md'
      - '.markdownlint-cli2.yaml'
      - '.github/workflows/markdown-lint.yaml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
